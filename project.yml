# Generate the Xcode project on macOS: `brew install xcodegen && xcodegen generate`
# Then open `Wintergarden.xcodeproj` in Xcode 15+.

name: Wintergarden
options:
  bundleIdPrefix: com.centuriesmutual
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Wintergarden:
    type: application
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.centuriesmutual.wintergarden
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: WintergardenApp/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        currentProjectVersion: "1"
        marketingVersion: "0.1.0"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    sources:
      - path: WintergardenApp
        excludes:
          - "**/README*"
          - "**/PrivacyInfo.xcprivacy"
    resources:
      - path: WintergardenApp/Resources/PrivacyInfo.xcprivacy

  WintergardenTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.centuriesmutual.wintergardenTests
    sources:
      - path: WintergardenTests
    dependencies:
      - target: Wintergarden

schemes:
  Wintergarden:
    build:
      targets:
        Wintergarden: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: WintergardenTests
          parallelizable: true
          randomExecutionOrder: false
